<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soundboard · 12 sounds · play/pause/stop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="soundboard">
    <h1>
      Soundboard
      <span class="badge">12 sounds</span>
    </h1>

    <div class="grid" id="soundGrid"></div>

    <div class="controls">
      <div class="volume-group">
        <label for="volumeSlider">Volume</label>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.80">
        <span id="volumeDisplay">80%</span>
      </div>
      <button class="stop-all-btn" id="stopAllBtn">⏹ Stop All</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
